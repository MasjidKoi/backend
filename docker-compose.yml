services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: masjidkoi_api
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      pgbouncer:
        condition: service_healthy
      gotrue:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgis/postgis:16-3.4
    container_name: masjidkoi_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-masjidkoi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-masjidkoi}
      POSTGRES_DB: ${POSTGRES_DB:-masjidkoi}
      POSTGRES_HOST_AUTH_METHOD: md5   # pgbouncer stores md5 hashes; scram-sha-256 requires plaintext
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-masjidkoi} -d ${POSTGRES_DB:-masjidkoi}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: masjidkoi_pgbouncer
    environment:
      DB_USER: ${POSTGRES_USER:-masjidkoi}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-masjidkoi}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-masjidkoi}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
      AUTH_TYPE: plain     # plain keeps password in plaintext so pgbouncer can do SCRAM to postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-masjidkoi}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── GoTrue — Auth server ──────────────────────────────────────────────────
  # Issues JWTs; manages users, sessions, TOTP/MFA, password reset emails.
  # FastAPI proxies all /auth/* calls here — clients never call GoTrue directly.
  # Admin endpoints require GOTRUE_SERVICE_ROLE_KEY (generated by gen_service_token.py).
  gotrue:
    image: ghcr.io/supabase/gotrue:v2.151.0
    container_name: masjidkoi_gotrue
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── JWT ─────────────────────────────────────────────────────────────
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET}
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role

      # ── Database ─────────────────────────────────────────────────────────
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:-masjidkoi}:${POSTGRES_PASSWORD:-masjidkoi}@postgres:5432/${POSTGRES_DB:-masjidkoi}
      DB_NAMESPACE: auth

      # ── API ──────────────────────────────────────────────────────────────
      GOTRUE_API_HOST: "0.0.0.0"
      PORT: 9999
      API_EXTERNAL_URL: ${GOTRUE_EXTERNAL_URL:-http://localhost:9999}
      GOTRUE_SITE_URL: ${FRONTEND_URL:-http://localhost:3000}

      # ── Signup policy ────────────────────────────────────────────────────
      # Disable public sign-up — all users are invited by platform admins
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"

      # ── Email (dev: auto-confirm, no SMTP needed) ────────────────────────
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-""}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-""}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-""}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_FROM:-noreply@masjidkoi.com}
      GOTRUE_SMTP_SENDER_NAME: MasjidKoi

      # ── Email redirect paths (GoTrue's own verification endpoints) ──────────
      # URLPATHS are paths on the GoTrue SERVER — must remain /verify.
      # The frontend redirect target is controlled by redirect_to in the invite API call.
      GOTRUE_MAILER_URLPATHS_INVITE: /verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /verify
      # Allow GoTrue to redirect to our frontend invite/reset pages
      GOTRUE_URI_ALLOW_LIST: ${GOTRUE_URI_ALLOW_LIST:-http://localhost:3000},http://localhost:3000/invite/accept,http://localhost:3000/password/reset-confirm

      # ── MFA / TOTP ────────────────────────────────────────────────────────
      GOTRUE_MFA_ENABLED: "true"
      GOTRUE_MFA_TOTP_ENROLLMENT_ENABLED: "true"
      GOTRUE_MFA_TOTP_VERIFICATION_PERIOD: 30
      GOTRUE_MFA_TOTP_ISSUER: MasjidKoi

      # ── Password policy ──────────────────────────────────────────────────
      GOTRUE_PASSWORD_MIN_LENGTH: 8

      # ── Security ─────────────────────────────────────────────────────────
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: "true"
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: 10
    ports:
      - "9999:9999"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
        NEXT_PUBLIC_APP_ENV: ${APP_ENV:-production}
    container_name: masjidkoi_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:latest
    container_name: masjidkoi_minio
    ports:
      - "9090:9000"
      - "9091:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: masjidkoi_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/masjidkoi-imports &&
      mc mb --ignore-existing local/masjidkoi-photos &&
      mc mb --ignore-existing local/masjidkoi-avatars &&
      echo 'Buckets ready.'
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: masjidkoi_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio-data:
